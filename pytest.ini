[pytest]
# Pytest configuration for Tegufox Browser Toolkit
# Phase 1 - Week 4

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    real_network: marks tests that require internet connection
    integration: marks integration tests
    unit: marks unit tests
    benchmark: marks performance benchmark tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes

# Coverage options (if pytest-cov is installed)
# addopts = --cov=. --cov-report=html --cov-report=term

# Timeout for tests (in seconds)
timeout = 300

# Ignore paths
norecursedirs = .git .pytest_cache __pycache__ venv build dist *.egg-info

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests/pytest.log
log_file_level = DEBUG
